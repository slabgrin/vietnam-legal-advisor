name: Vietnam Legal Advisor — Weekly Update

on:
  schedule:
    - cron: "0 2 * * 1"   # Every Monday at 02:00 UTC (09:00 Hanoi time)
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: python scripts/scraper.py

      - name: Run analyzer
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: python scripts/analyzer.py

      - name: Run generator
        run: python scripts/generator.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          commit_message: "chore: legal update ${{ github.run_id }}"
